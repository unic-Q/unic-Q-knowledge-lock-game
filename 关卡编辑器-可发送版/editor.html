        trackingTime: normalizedTrackingTime,
        path,
        moveSpeed,
      });
      pathDraft = null;
      saveRoomData();
      render();
    }

    function finishEnemyPatrol() {
      if (!enemyDrag) return;
      const patrol = {
        start: { ...enemyDrag.start },
        end: { ...enemyDrag.current }
      };
      enemyPatrols = enemyPatrols.filter(item =>
        item.start.x !== patrol.start.x || item.start.y !== patrol.start.y
      );
      enemyPatrols.push(patrol);
      grid[patrol.start.y][patrol.start.x] = 'M';
      enemyDrag = null;
      saveRoomData();
      render();
    }

    function finishEmitterPlacement() {
      if (!emitterDrag) return;
      const start = emitterDrag.start;
      const current = emitterDrag.current;
      const rawDx = current.x - start.x;
      const rawDy = current.y - start.y;
      const direction = snapDirection(rawDx, rawDy);
      const directionChoice = promptEmitterDirection(false, direction);
      if (!directionChoice) {
        emitterDrag = null;
        render();
        return;
      }
      const hazard = prompt('灾厄喷口危险物：spike / plague / lightning', 'spike');
      if (hazard === null) {
        emitterDrag = null;
        render();
        return;
      }
      const size = clampNumber(prompt('发射物大小（格边长单位，0.25-3）', '0.5'), 0.25, 3, 0.5);
      const period = clampNumber(prompt('周期时长（秒，0.2-10）', '2'), 0.2, 10, 2);
      const duty = clampNumber(prompt('发射占比（0.05-1）', '0.35'), 0.05, 1, 0.35);
      const speed = clampNumber(prompt('速度（格/秒，0.5-20）', '6'), 0.5, 20, 6);
      const trackingInput = prompt('追踪时间（秒）。0=直线；追踪范围0.5-3', '0');
      if (trackingInput === null) {
        emitterDrag = null;
        render();
        return;
      }
      const trackingTime = clampNumber(trackingInput, 0, 3, 0);
      const normalizedTrackingTime = trackingTime > 0 ? Math.max(0.5, trackingTime) : 0;
      emitters = emitters.filter(item => item.x !== start.x || item.y !== start.y);
      grid[start.y][start.x] = 'O';
      emitters.push({
        x: start.x,
        y: start.y,
        dx: directionChoice.x,
        dy: directionChoice.y,
        directionMode: directionChoice.mode,
        hazard: hazard.trim().toLowerCase().startsWith('plague') ? 'plague' : hazard.trim().toLowerCase().startsWith('light') ? 'lightning' : 'spike',
        size,
        period,
        duty,
        speed,
        trackingTime: normalizedTrackingTime,
      });
      emitterDrag = null;
      saveRoomData();
      render();
    }

    function finishMovingPlatformPlacement() {
      if (!movingPlatformDrag) return;
      const start = movingPlatformDrag.start;
      const end = { ...movingPlatformDrag.current };
      if (Math.abs(end.x - start.x) <= 1) end.x = start.x;
      if (end.x === start.x && end.y === start.y) {
        movingPlatformDrag = null;
        render();
        return;
      }
      const speed = clampNumber(prompt('移动平台速度（格/秒，0.1-10）', '1'), 0.1, 10, 1);
      const loop = confirm('移动平台是否需要返回？确定=来回走，取消=只走到终点。');
      movingPlatforms = movingPlatforms.filter(item => item.x !== start.x || item.y !== start.y);
      grid[start.y][start.x] = 'V';
      movingPlatforms.push({
        x: start.x,
        y: start.y,
        path: [{ ...start }, end],
        speed,
        loop,
      });
      movingPlatformDrag = null;
      saveRoomData();
      render();
    }

    function finishPlatformGeneratorPlacement() {
      if (!platformGeneratorDrag) return;
      const rect = normalizedDragRect(platformGeneratorDrag.start, platformGeneratorDrag.current);
      if (rect.w < 1 || rect.h < 1) {
        platformGeneratorDrag = null;
        render();
        return;
      }
      const interval = clampNumber(prompt('平台生成间隔（秒，0.15-10）', '1.2'), 0.15, 10, 1.2);
      const speed = clampNumber(prompt('平台下落速度（格/秒，0.1-10）', '1.4'), 0.1, 10, 1.4);
      platformGenerators = platformGenerators.filter(item =>
        !(item.x === rect.x && item.y === rect.y && item.w === rect.w && item.h === rect.h)
      );
      platformGenerators.push({
        x: rect.x,
        y: rect.y,
        w: rect.w,
        h: rect.h,
        interval,
        speed,
      });
      platformGeneratorDrag = null;
      saveRoomData();
      render();
    }

    function finishDropBossPlacement() {
      if (!dropBossDrag) return;
      const zone = normalizedDragRect(dropBossDrag.start, dropBossDrag.current);
      if (zone.w < 1 || zone.h < 1) {
        dropBossDrag = null;
        render();
        return;
      }
      const interval = clampNumber(prompt('Boss 掉落间隔（秒，0.25-10）', '0.9'), 0.25, 10, 0.9);
      const warningTime = clampNumber(prompt('预警时间（秒，0.2-3）', '0.65'), 0.2, 3, 0.65);
      const fallSpeed = clampNumber(prompt('掉落速度（格/秒，0.5-20）', '3.2'), 0.5, 20, 3.2);
      const moveSpeed = clampNumber(prompt('Boss 横向速度（格/秒，0-10）', '2'), 0, 10, 2);
      const bossW = 10;
      const bossH = 10;
      const zoneCenter = zone.x + zone.w / 2;
      const bossX = Math.max(0, Math.min(COLS - bossW, Math.floor(zoneCenter - bossW / 2)));
      const bossY = Math.max(0, Math.min(ROWS - bossH, Math.floor(zone.y - bossH)));
      dropBosses = dropBosses.filter(item => item.x !== bossX || item.y !== bossY);
      dropBosses.push({
        x: bossX,
        y: bossY,
        w: bossW,
        h: bossH,
        zone,
        interval,
        warningTime,
        fallSpeed,
        moveSpeed,
      });
      dropBossDrag = null;
      saveRoomData();
      render();
    }

    function snapDirection(dx, dy) {
      if (dx === 0 && dy === 0) return { x: 1, y: 0 };
      const angle = Math.atan2(dy, dx);
      const step = Math.round(angle / (Math.PI / 4));
      const snapped = step * Math.PI / 4;
      return {
        x: Math.round(Math.cos(snapped)),
        y: Math.round(Math.sin(snapped)),
      };
    }

    function promptEmitterDirection(allowFacing, fallback) {
      const message = allowFacing
        ? '发射方向：1上 2下 3左 4右 5面朝方向'
        : '发射方向：1上 2下 3左 4右';
      const defaultValue = directionChoiceFromVector(fallback);
      const choice = prompt(message, defaultValue);
      if (choice === null) return null;
      const value = String(choice).trim();
      if (value === '1' || value === '上') return { mode: 'up', x: 0, y: -1 };
      if (value === '2' || value === '下') return { mode: 'down', x: 0, y: 1 };
      if (value === '3' || value === '左') return { mode: 'left', x: -1, y: 0 };
      if (value === '4' || value === '右') return { mode: 'right', x: 1, y: 0 };
      if (allowFacing && (value === '5' || value === '面朝方向')) return { mode: 'facing', x: fallback.x || 1, y: fallback.y || 0 };
      return promptEmitterDirection(allowFacing, fallback);
    }

    function directionChoiceFromVector(vector) {
      if (Math.abs(vector.y) >= Math.abs(vector.x)) return vector.y < 0 ? '1' : '2';
      return vector.x < 0 ? '3' : '4';
    }

    function emitterDirectionVector(emitter) {
      const mode = emitter.directionMode || emitter.direction || 'vector';
      if (mode === 'up') return { x: 0, y: -1 };
      if (mode === 'down') return { x: 0, y: 1 };
      if (mode === 'left') return { x: -1, y: 0 };
      if (mode === 'right') return { x: 1, y: 0 };
      if (mode === 'facing') return { x: Number(emitter.dx || 1), y: Number(emitter.dy || 0) };
      return { x: Number(emitter.dx || 1), y: Number(emitter.dy || 0) };
    }

    function surfaceKey(surface) {
      const normalized = normalizeSurface(surface);
      return `${normalized.x},${normalized.y},${normalized.face}`;
    }

    function equivalentSurfaceKeys(surface) {
      const rawX = Number(surface.x);
      const rawY = Number(surface.y);
      const rawFace = ((Number(surface.face) % 4) + 4) % 4;
      const normalized = normalizeSurface(surface);
      const keys = new Set([`${normalized.x},${normalized.y},${normalized.face}`]);
      keys.add(`${rawX},${rawY},${rawFace}`);
      if (rawFace === 0) keys.add(`${rawX},${rawY - 1},2`);
      if (rawFace === 1) keys.add(`${rawX + 1},${rawY},3`);
      if (rawFace === 2) keys.add(`${rawX},${rawY + 1},0`);
      if (rawFace === 3) keys.add(`${rawX - 1},${rawY},1`);
      return keys;
    }

    function normalizeSurface(surface) {
      let x = Number(surface.x);
      let y = Number(surface.y);
      let face = ((Number(surface.face) % 4) + 4) % 4;
      if (face === 2) {
        y += 1;
        face = 0;
      } else if (face === 3) {
        x -= 1;
        face = 1;
      }
      return {
        x,
        y,
        face
      };
    }

    function paintSurface(surface, erase = false) {
      const aliases = equivalentSurfaceKeys(surface);
      if (!cellHasBody(surface.x, surface.y)) return;
      surface = normalizeSurface(surface);
      if (!inGrid(surface.x, surface.y)) return;
      const before = surfacePlagues.length;
      surfacePlagues = surfacePlagues.filter(p => !aliases.has(surfaceKey(p)));
      if (!erase && before === surfacePlagues.length) surfacePlagues.push(surface);
      surfacePlagues = dedupeSurfacePlagues(surfacePlagues);
      saveRoomData();
      render();
    }

    function plagueSurfaceHasBody(surface) {
      const normalized = normalizeSurface(surface);
      if (!inGrid(normalized.x, normalized.y)) return false;
      if (normalized.face === 0) {
        return cellHasBody(normalized.x, normalized.y) || cellHasBody(normalized.x, normalized.y - 1);
      }
      if (normalized.face === 1) {
        return cellHasBody(normalized.x, normalized.y) || cellHasBody(normalized.x + 1, normalized.y);
      }
      return cellHasBody(normalized.x, normalized.y);
    }

    function dedupeSurfacePlagues(plagues) {
      const seen = new Set();
      return plagues.map(normalizeSurface).filter((p) => {
        if (!inGrid(p.x, p.y)) return false;
        const key = surfaceKey(p);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function normalizeControlTarget(target) {
      if (target?.type !== 'plague') return target;
      return { type: 'plague', ...normalizeSurface(target) };
    }

    function normalizeControlBindings(bindings) {
      return (bindings || []).map(binding => ({
        ...binding,
        targets: (binding.targets || []).map(normalizeControlTarget)
      }));
    }

    function normalizeSequencers(items) {
      return (items || []).map(item => ({
        ...item,
        targets: (item.targets || []).map(normalizeControlTarget),
        events: (item.events || []).map(event => ({
          ...event,
          targets: (event.targets || []).map(normalizeControlTarget)
        }))
      }));
    }

    function normalizeTargetDefaults(defaults) {
      const normalized = {};
      for (const [key, value] of Object.entries(defaults || {})) {
        const parts = key.split(':');
        if (parts[0] !== 'plague') {
          normalized[key] = value;
          continue;
        }
        const [x, y, face] = (parts[1] || '').split(',').map(Number);
        const surface = normalizeSurface({ x, y, face });
        normalized[`plague:${surface.x},${surface.y},${surface.face}`] = value;
      }
      return normalized;
    }

    function setMode(mode) {
      editorMode = mode;
      document.getElementById('mode-tile').classList.toggle('active', mode === 'tile');
      document.getElementById('mode-surface').classList.toggle('active', mode === 'surface');
      document.getElementById('btn-spawn').classList.toggle('active', mode === 'spawn');
    }

    async function toggleWorldMap() {
      if (viewMode === 'room') {
        saveRoomData();
        viewMode = 'world';
        isPainting = false;
        mapDrag = null;
        mapPan = null;
        canvas.style.cursor = 'grab';
        document.getElementById('btn-world-map').textContent = '切换到单关';
        document.getElementById('btn-world-map').classList.add('active');
        await loadWorldMap();
        render();
      } else {
        viewMode = 'room';
        canvas.style.cursor = 'crosshair';
        document.getElementById('btn-world-map').textContent = '切换到单关';
        document.getElementById('btn-world-map').classList.remove('active');
        render();
      }
    }

    function canvasPoint(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    function mapRoomAt(point) {
      const worldPoint = {
        x: point.x - mapCamera.x,
        y: point.y - mapCamera.y
      };
      for (let i = mapRooms.length - 1; i >= 0; i -= 1) {
        const room = mapRooms[i];
        if (
          worldPoint.x >= room.mapX && worldPoint.x <= room.mapX + mapRoomW(room) &&
          worldPoint.y >= room.mapY && worldPoint.y <= room.mapY + mapRoomH(room)
        ) return room;
      }
      return null;
    }

    function paintAt(e) {
      if (editorMode === 'spawn') {
        const { x, y } = getCell(e);
        spawn = { x: x * TILE + 4, y: y * TILE + 4 };
        saveRoomData();
        render();
        return;
      }
      if (editorMode === 'surface') {
        const erase = paintButton === 2 || currentChar === '.';
        if (currentChar !== 'P' && !erase) return;
        const surface = surfaceTargetFromPointer(e);
        const key = surfaceKey(surface) + `:${paintButton}`;
        if (key === lastPaintKey) return;
        lastPaintKey = key;
        paintSurface(surface, erase);
        return;
      }
      const { x, y } = getCell(e);
      const char = paintButton === 2 ? '.' : currentChar;
      const key = `${x},${y},${char}`;
      if (key === lastPaintKey) return;
      lastPaintKey = key;
      if (currentChar === '~') {
        if (paintButton === 2) {
          removeLightningNodeNearPointer(e);
          isPainting = false;
          return;
        }
        const surface = surfaceTargetFromPointer(e);
        if (!cellHasBody(surface.x, surface.y)) {
          alert('闪电链桩只能放在格子表面。');
          isPainting = false;
          return;
        }
        editLightningNode(surface, false);
        isPainting = false;
        return;
      }
      if (CONTROL_CHARS.has(currentChar) && paintButton !== 2) {
        const surface = surfaceTargetFromPointer(e);
        const surfaceTargetKey = controlTargetKey({ type: 'plague', ...surface });
        const plagueTarget = surfacePlagues.find(p => controlTargetKey({ type: 'plague', ...p }) === surfaceTargetKey);
        const target = lightningTargetNearPoint(canvasPoint(e)) ||
          (plagueTarget ? { type: 'plague', ...plagueTarget } : null) ||
          controllableTargetAt(x, y);
        if (target) {
          togglePendingControlTarget(target);
          isPainting = false;
          return;
        }
        placeBoundControl(x, y, currentChar);
        isPainting = false;
        return;
      }
      placeCell(x, y, char, e.shiftKey, e.ctrlKey || e.metaKey);
    }

    canvas.addEventListener('mousemove', (e) => {
      if (viewMode === 'world') {
        const point = canvasPoint(e);
        if (mapDrag) {
          const worldX = point.x - mapCamera.x;
          const worldY = point.y - mapCamera.y;
          const rawX = worldX - mapDrag.dx;
          const rawY = worldY - mapDrag.dy;
          const snapped = snapMapRoom(mapDrag.room, rawX, rawY);
          mapDrag.room.mapX = snapped.x;
          mapDrag.room.mapY = snapped.y;
          hoveredMapRoom = mapDrag.room;
          render();
        } else if (mapPan) {
          mapCamera.x = mapPan.cameraX + point.x - mapPan.startX;
          mapCamera.y = mapPan.cameraY + point.y - mapPan.startY;
          hoveredMapRoom = null;
          render();
        } else {
          hoveredMapRoom = mapRoomAt(point);
          canvas.style.cursor = hoveredMapRoom ? 'grab' : 'default';
          render();
        }
        return;
      }
      const { x, y } = getCell(e);
      cursorX = x;
      cursorY = y;
      if (enemyDrag) {
        enemyDrag.current = { x, y };
        render();
        return;
      }
      if (emitterDrag) {
        emitterDrag.current = { x, y };
        render();
        return;
      }
      if (movingPlatformDrag) {
        movingPlatformDrag.current = { x, y };
        render();
        return;
      }
      if (platformGeneratorDrag) {
        platformGeneratorDrag.current = { x, y };
        render();
        return;
      }
      if (dropBossDrag) {
        dropBossDrag.current = { x, y };
        render();
        return;
      }
      if (isPainting) paintAt(e);
      else render();
    });

    canvas.addEventListener('mouseleave', () => {
      cursorX = -1;
      cursorY = -1;
      isPainting = false;
      if (mapDrag) saveWorldMapLayout();
      mapDrag = null;
      mapPan = null;
      movingPlatformDrag = null;
      platformGeneratorDrag = null;
      dropBossDrag = null;
      hoveredMapRoom = null;
      render();
    });

    canvas.addEventListener('mousedown', (e) => {
      e.preventDefault();
      if (viewMode === 'world') {
        if (e.button !== 0) return;
        const point = canvasPoint(e);
        const room = mapRoomAt(point);
        if (room) {
          const worldX = point.x - mapCamera.x;
          const worldY = point.y - mapCamera.y;
          mapDrag = { room, dx: worldX - room.mapX, dy: worldY - room.mapY };
          hoveredMapRoom = room;
          canvas.style.cursor = 'grabbing';
        } else {
          mapPan = {
            startX: point.x,
            startY: point.y,
            cameraX: mapCamera.x,
            cameraY: mapCamera.y
          };
          hoveredMapRoom = null;
          canvas.style.cursor = 'grabbing';
        }
        return;
      }
      if (editorMode === 'tile' && currentChar === 'M' && e.button === 0) {
        const cell = getCell(e);
        enemyDrag = { start: cell, current: cell };
        isPainting = false;
        render();
        return;
      }
      if (editorMode === 'tile' && currentChar === 'N' && e.button === 0) {
        addAdvancedPathPoint('advancedEnemy', getCell(e));
        isPainting = false;
        return;
      }
      if (editorMode === 'tile' && currentChar === 'O' && e.button === 0) {
        const cell = getCell(e);
        emitterDrag = { start: cell, current: cell };
        isPainting = false;
        render();
        return;
      }
      if (editorMode === 'tile' && currentChar === 'V' && e.button === 0) {
        const cell = getCell(e);
        movingPlatformDrag = { start: cell, current: cell };
        isPainting = false;
        render();
        return;
      }
      if (editorMode === 'tile' && currentChar === '1' && e.button === 0) {
        const cell = getCell(e);
        platformGeneratorDrag = { start: cell, current: cell };
        isPainting = false;
        render();
        return;
      }
      if (editorMode === 'tile' && currentChar === '2' && e.button === 0) {
        const cell = getCell(e);
        dropBossDrag = { start: cell, current: cell };
        isPainting = false;
        render();
        return;
      }
      if (editorMode === 'tile' && currentChar === 'Y' && e.button === 0) {
        addAdvancedPathPoint('advancedEmitter', getCell(e));
        isPainting = false;
        return;
      }
      isPainting = true;
      paintButton = e.button;
      lastPaintKey = '';
      paintAt(e);
    });

    window.addEventListener('mouseup', () => {
      if (enemyDrag) {
        finishEnemyPatrol();
        return;
      }
      if (emitterDrag) {
        finishEmitterPlacement();
        return;
      }
      if (movingPlatformDrag) {
        finishMovingPlatformPlacement();
        return;
      }
      if (platformGeneratorDrag) {
        finishPlatformGeneratorPlacement();
        return;
      }
      if (dropBossDrag) {
        finishDropBossPlacement();
        return;
      }
      if (mapDrag) {
        saveWorldMapLayout();
        mapDrag = null;
        canvas.style.cursor = 'grab';
      }
      if (mapPan) {
        mapPan = null;
        canvas.style.cursor = 'grab';
      }
      isPainting = false;
      lastPaintKey = '';
    });

    canvas.addEventListener('dblclick', (e) => {
      if (viewMode !== 'world') return;
      const room = mapRoomAt(canvasPoint(e));
      if (!room) return;
      viewMode = 'room';
        document.getElementById('btn-world-map').textContent = '切换到单关';
      document.getElementById('btn-world-map').classList.remove('active');
      canvas.style.cursor = 'crosshair';
      loadRoom(room.room);
    });

    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      const num = parseInt(e.key);
      if (num >= 1 && num <= 9) {
        const idx = num - 1;
        if (idx < BLOCK_TYPES.length) selectBlock(BLOCK_TYPES[idx].char);
        return;
      }

      if (e.key === '0') {
        const idx = 9;
        if (idx < BLOCK_TYPES.length) selectBlock(BLOCK_TYPES[idx].char);
      }

      const shortcuts = { '#': '#', '=': '=', '-': '-', 'u': 'U', 'l': 'L', 'j': 'J', '.': '.', 'h': 'H', '!': '!', '~': '~', 'm': 'M', 'k': 'K', 's': 'S', 'i': 'I', 't': 'T', 'f': 'F', 'd': 'D', 'g': 'G', 'r': 'R', 'w': 'W', 'b': 'B', 'a': 'A', 'p': 'P', 'c': 'C' };
      if (shortcuts[e.key.toLowerCase()]) {
        selectBlock(shortcuts[e.key.toLowerCase()]);
      }
      if (e.key.toLowerCase() === 'v') setMode(editorMode === 'surface' ? 'tile' : 'surface');
      if (e.key.toLowerCase() === 's') setMode('spawn');
    });

    document.getElementById('mode-tile').addEventListener('click', () => setMode('tile'));
    document.getElementById('mode-surface').addEventListener('click', () => setMode('surface'));
    document.getElementById('btn-finish-path')?.addEventListener('click', finishAdvancedPath);
    document.getElementById('size-normal').addEventListener('click', () => setRoomSize(20));
    document.getElementById('size-boss').addEventListener('click', () => setRoomSize(40));
    document.getElementById('btn-spawn').addEventListener('click', () => setMode('spawn'));
    document.getElementById('btn-reach-overlay').addEventListener('click', (event) => {
      reachOverlay = !reachOverlay;
      event.currentTarget.classList.toggle('active', reachOverlay);
      event.currentTarget.textContent = reachOverlay ? '可达区域：开' : '可达区域：关';
      render();
    });
    document.getElementById('playtest-loadout').addEventListener('change', () => {
      if (reachOverlay) render();
    });
    document.getElementById('btn-world-map').addEventListener('click', () => toggleWorldMap());

    document.getElementById('btn-load-room').addEventListener('click', () => {
      const num = parseInt(document.getElementById('room-num').value) || 1;
      loadRoom(num);
    });

    document.getElementById('btn-delete-room').addEventListener('click', async () => {
      const roomId = currentRoom;
      if (!confirm(`确定永久删除第 ${roomId} 关吗？\n\n关卡内容和大地图位置都会被删除，但其它关卡不会重新编号。以后仍可加载第 ${roomId} 关重新制作。\n\n此操作无法撤销。`)) return;
      try {
        const response = await fetch('/api/delete-level', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ room: roomId })
        });
        const result = await response.json();
        if (!result.ok) throw new Error(result.error || '导出失败');

        localStorage.removeItem(`room_${roomId}`);
        localStorage.removeItem('exportedLevelsFingerprint');
        const layout = loadLocalMapLayout();
        if (layout.positions) delete layout.positions[String(roomId)];
        localStorage.setItem('worldMapLayout', JSON.stringify(layout));
        mapLayout = layout;
        mapRooms = mapRooms.filter(room => Number(room.room) !== roomId);

        const exported = await fetch('/api/exported-levels', { cache: 'no-store' }).then(item => item.json());
        if (exported.ok) {
          localStorage.setItem('exportedLevelsFingerprint', JSON.stringify({
            rooms: exported.rooms,
            map: exported.map || null
          }));
        }
        loadRoom(roomId);
      } catch (error) {
        alert(`删除失败：${error.message}\n请确认编辑器是通过“启动关卡编辑器.bat”打开的。`);
      }
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      grid = createEmptyGrid();
      surfacePlagues = [];
      controlBindings = [];
      lightningChains = [];
      emitters = [];
      sequencers = [];
      targetDefaults = {};
      activeLightningChain = -1;
      enemyPatrols = [];
      advancedEnemies = [];
      movingPlatforms = [];
      platformGenerators = [];
      dropBosses = [];
      pathDraft = null;
      pendingControlTargets = [];
      saveRoomData();
      render();
    });

    document.getElementById('btn-walls').addEventListener('click', () => {
      for (let x = 0; x < COLS; x += 1) {
        grid[0][x] = '#';
        grid[ROWS - 1][x] = '#';
        grid[ROOM_FLOOR][x] = '#';
      }
      for (let y = 0; y < ROWS; y += 1) {
        grid[y][0] = '#';
        grid[y][COLS - 1] = '#';
      }
      saveRoomData();
      render();
    });

    document.getElementById('btn-export').addEventListener('click', (event) => {
      saveRoomData();
      const data = currentRoomExportData();
      document.getElementById('data-io').value = JSON.stringify(data);
      writeLevelFiles({ version: 1, cols: COLS, rows: ROWS, rooms: [data] }, event.currentTarget);
    });

    document.getElementById('btn-export-all').addEventListener('click', (event) => {
      const data = buildAllLevelsExport();
      document.getElementById('data-io').value = JSON.stringify(data);
      writeLevelFiles(data, event.currentTarget);
    });

    document.getElementById('btn-import').addEventListener('click', () => {
      try {
        const data = JSON.parse(document.getElementById('data-io').value);
        if (Array.isArray(data.rooms)) {
          for (const roomData of data.rooms) {
            if (!roomData.room || !Array.isArray(roomData.blocks)) continue;
            const size = roomSizeFromData(roomData);
            const normalized = {
              roomSize: size,
              blocks: normalizeGrid(roomData.blocks, size).map(row => row.join('')),
              surfacePlagues: dedupeSurfacePlagues(roomData.surfacePlagues || []),
              controlBindings: roomData.controlBindings || [],
              lightningChains: normalizeLightningChains(roomData),
              lightningNodes: allLightningNodes(normalizeLightningChains(roomData)),
              emitters: roomData.emitters || [],
              sequencers: roomData.sequencers || [],
              targetDefaults: roomData.targetDefaults || {},
              enemyPatrols: roomData.enemyPatrols || [],
              advancedEnemies: roomData.advancedEnemies || [],
              movingPlatforms: roomData.movingPlatforms || [],
              platformGenerators: roomData.platformGenerators || [],
              dropBosses: roomData.dropBosses || [],
              spawn: roomData.spawn || defaultSpawn(size)
            };
            localStorage.setItem(`room_${roomData.room}`, JSON.stringify(normalized));
          }
          loadRoom(currentRoom);
        } else if (data.blocks && Array.isArray(data.blocks)) {
          applyRoomSize(roomSizeFromData(data));
          grid = normalizeGrid(data.blocks, roomSize);
          surfacePlagues = dedupeSurfacePlagues(data.surfacePlagues || []);
          controlBindings = data.controlBindings || [];
          lightningChains = normalizeLightningChains(data);
          emitters = data.emitters || [];
          sequencers = data.sequencers || [];
          activeLightningChain = -1;
          enemyPatrols = data.enemyPatrols || [];
          advancedEnemies = data.advancedEnemies || [];
          movingPlatforms = data.movingPlatforms || [];
          platformGenerators = data.platformGenerators || [];
          dropBosses = data.dropBosses || [];
          spawn = data.spawn || defaultSpawn();
          if (data.room) currentRoom = data.room;
          saveRoomData();
          render();
        }
      } catch (err) {
        alert('导入失败：无效数据格式。');
      }
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      if (confirm('确定要重置当前房间吗？这将清除所有自定义内容。')) {
        localStorage.removeItem(`room_${currentRoom}`);
        grid = createDefaultRoom();
        surfacePlagues = [];
        controlBindings = [];
        lightningChains = [];
        emitters = [];
        sequencers = [];
        targetDefaults = {};
        activeLightningChain = -1;
        enemyPatrols = [];
        advancedEnemies = [];
        movingPlatforms = [];
        platformGenerators = [];
        dropBosses = [];
        pathDraft = null;
        pendingControlTargets = [];
        spawn = defaultSpawn();
        saveRoomData();
        render();
      }
    });

    document.getElementById('btn-playtest-room').addEventListener('click', () => {
      const loadout = document.getElementById('playtest-loadout').value;
      saveRoomData();
      let roomData = currentRoomExportData();
      if (viewMode === 'world') {
        const target = hoveredMapRoom || mapRooms.find(room => Number(room.room) === Number(currentRoom));
        if (target) {
          roomData = localRoomExportData(target.room) || {
            room: Number(target.room),
            roomSize: roomSizeFromData(target),
            blocks: normalizeGrid(target.blocks, roomSizeFromData(target)).map(row => row.join('')),
            surfacePlagues: dedupeSurfacePlagues(target.surfacePlagues || []),
            controlBindings: target.controlBindings || [],
            lightningChains: normalizeLightningChains(target),
            lightningNodes: allLightningNodes(normalizeLightningChains(target)),
            emitters: target.emitters || [],
            sequencers: target.sequencers || [],
            targetDefaults: target.targetDefaults || {},
            enemyPatrols: target.enemyPatrols || [],
            advancedEnemies: target.advancedEnemies || [],
            movingPlatforms: target.movingPlatforms || [],
            platformGenerators: target.platformGenerators || [],
            dropBosses: target.dropBosses || [],
            spawn: target.spawn || defaultSpawn(roomSizeFromData(target))
          };
        }
      }
      if (isDefaultRoomData(roomData) && !confirm('当前试玩数据看起来是默认空房间。仍然试玩吗？')) {
        return;
      }
      const data = {
        id: roomData.room,
        roomSize: roomSizeFromData(roomData),
        name: `编辑器试玩${String(roomData.room).padStart(2, '0')}`,
        spawn: Array.isArray(roomData.spawn) ? roomData.spawn : [roomData.spawn.x, roomData.spawn.y],
        flag: null,
        helmet: null,
        links: {},
        blocks: roomData.blocks,
        surfacePlagues: dedupeSurfacePlagues(roomData.surfacePlagues || []),
        controlBindings: roomData.controlBindings || [],
        lightningChains: normalizeLightningChains(roomData),
        lightningNodes: allLightningNodes(normalizeLightningChains(roomData)),
        emitters: roomData.emitters || [],
        sequencers: roomData.sequencers || [],
        targetDefaults: roomData.targetDefaults || {},
        enemyPatrols: roomData.enemyPatrols || [],
        advancedEnemies: roomData.advancedEnemies || [],
        movingPlatforms: roomData.movingPlatforms || [],
        platformGenerators: roomData.platformGenerators || [],
        dropBosses: roomData.dropBosses || [],
        playtestLoadout: loadout
      };
      localStorage.setItem('editorPlaytestRoom', JSON.stringify(data));
      const playUrl = `index.html?editorTest=1&fresh=${Date.now()}`;
      const playWindow = window.open(playUrl, '_blank');
      if (!playWindow) alert('浏览器阻止了试玩窗口，请允许此页面打开弹出式窗口后重试。');
      writeLevelFiles({ version: 1, cols: COLS, rows: ROWS, rooms: [roomData] });
    });

    document.getElementById('btn-playtest-world').addEventListener('click', () => {
      saveRoomData();
      if (viewMode !== 'world') {
        mapLayout = loadLocalMapLayout();
        mapRooms = applyMapPositions(buildAllLevelsExport().rooms, mapLayout);
      }
      if (!mapRooms.length) {
        alert('还没有可总体试玩的关卡。先编辑或保存至少一关。');
        return;
      }
      saveWorldMapLayout();
      const data = buildWorldPlaytestData();
      localStorage.setItem('editorWorldPlaytest', JSON.stringify(data));
      const playUrl = `index.html?worldTest=1&fresh=${Date.now()}`;
      const playWindow = window.open(playUrl, '_blank');
      if (!playWindow) alert('浏览器阻止了试玩窗口，请允许此页面打开弹出式窗口后重试。');
      writeLevelFiles(buildAllLevelsExport());
    });

    async function bootstrapEditor() {
      await syncChangedExportedLevels();
      buildPalette();
      setMode('tile');
      selectBlock('#');
      loadRoom(1);
    }

    bootstrapEditor();
    setInterval(() => {
      if (viewMode === 'room' && CONTROL_CHARS.has(currentChar) && grid.length === ROWS) render();
    }, 120);
  </script>
</body>
</html>
